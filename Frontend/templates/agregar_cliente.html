{% extends "base.html" %}

{% block content %}

<div class="base-container" style="max-width: 700px; margin: 0 auto;">
    <h2 style="color: #00ff66; font-weight: 700; text-align: center; margin-bottom: 5px;">
        🚗 Agregar Cliente
    </h2>
    <p style="color: #888; text-align: center; margin-bottom: 20px; font-size: 14px;">
        Completa los datos del vehículo y cliente
    </p>

    <form method="POST" action="/agregar" id="formAgregar">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <!-- ============================
             FILA 1: Nombre + Flota
             ============================ -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">👤 Nombre del cliente</label>
                <input type="text" name="nombre" class="form-control" required placeholder="Ej: Juan Pérez">
            </div>
            <!-- ============================
     ESTADO DEL CLIENTE (DEUDOR)
     ============================ -->
<div id="estadoClienteContainer" style="display: none; padding: 10px 14px; border-radius: 10px; margin-bottom: 12px; border: 2px solid;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="circuloClienteEstado" style="display: inline-block; width: 14px; height: 14px; border-radius: 50%;"></span>
            <span id="textoClienteEstado" style="font-weight: 700; font-size: 15px;"></span>
        </div>
        <div>
            <span style="color: #888;">💰 Deuda:</span>
            <span id="montoClienteDeuda" style="font-weight: 700; font-size: 16px; color: #ff6b6b;">$0</span>
        </div>
    </div>
    <div style="margin-top: 4px; font-size: 12px; color: #888;">
        <span id="fechaClienteDeuda"></span>
        <button onclick="verHistorialCliente()" style="
            background: transparent;
            color: #4fc3f7;
            border: 1px solid rgba(79,195,247,0.3);
            border-radius: 6px;
            padding: 2px 12px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        ">
            📜 Historial
        </button>
    </div>
</div>
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">🚛 Flota</label>
                <div style="display: flex; gap: 6px;">
                    <select name="flota" id="flotaSelect" class="form-control" style="flex:1;">
                        <option value="">Sin flota</option>
                        {% for f in flotas %}
                        <option value="{{ f }}">{{ f }}</option>
                        {% endfor %}
                        <option value="__nueva__">➕ Crear nueva flota</option>
                    </select>
                    <button type="button" id="btnNuevaFlota" class="btn btn-sm" style="
                        background: rgba(0,255,102,0.12);
                        color: #00ff66;
                        border: 1px solid rgba(0,255,102,0.20);
                        border-radius: 8px;
                        padding: 0 14px;
                        white-space: nowrap;
                    ">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <input type="text" id="flotaNuevaInput" name="flota_nueva" style="display:none; margin-top: 6px;" class="form-control" placeholder="Nombre de la nueva flota">
                <small style="color: #666; font-size: 11px;">Selecciona una flota existente o crea una nueva</small>
            </div>
        </div>

        <!-- ============================
             FILA 2: Fecha + Patente
             ============================ -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">📅 Fecha</label>
                <input type="date" name="fecha" class="form-control" value="{{ hoy }}" readonly style="background: rgba(255,255,255,0.04); color: #888;">
            </div>
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">🔢 Patente del vehículo</label>
                <input type="text" name="patente" class="form-control" required placeholder="Ej: ABCD12" style="text-transform: uppercase;">
            </div>
        </div>

        <!-- ============================
             FILA 3: Marca + Modelo
             ============================ -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">🏷️ Marca</label>
                <select id="marca" name="marca" class="form-control" required>
                    <option value="">Seleccione marca</option>
                    {% for m in marcas %}
                    <option value="{{ m }}">{{ m }}</option>
                    {% endfor %}
                    <option value="__manual__">OTRA</option>
                </select>
                <input type="text" id="marca_manual" name="marca_manual" class="form-control mt-2" style="display:none;" placeholder="Escriba la marca">
            </div>
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">📐 Modelo</label>
                <select id="modelo" name="modelo" class="form-control" required>
                    <option value="">Seleccione modelo</option>
                </select>
                <input type="text" id="modelo_manual" name="modelo_manual" class="form-control mt-2" style="display:none;" placeholder="Escriba el modelo">
            </div>
        </div>

        <!-- ============================
             FILA 4: Año (opcional) + Kilometraje
             ============================ -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">📆 Año <span style="color: #666; font-weight: 400;">(opcional)</span></label>
                <input type="number" name="anio" class="form-control" placeholder="Ej: 2020" min="1900" max="2099">
            </div>
            <div class="mb-3">
                <label style="color: #90e0a0; font-weight: 500;">📊 Kilometraje</label>
                <input type="number" name="kilometraje" class="form-control" placeholder="Ej: 45000" min="0" value="0">
            </div>
        </div>

        <!-- ============================
             USUARIO QUE REGISTRA (automático)
             ============================ -->
        <div class="mb-3">
            <label style="color: #90e0a0; font-weight: 500;">👤 Usuario que registra</label>
            <input type="text" name="usuario_registra" class="form-control" value="{{ session.get('nombre_completo', session.get('usuario')) }}" readonly style="background: rgba(255,255,255,0.04); color: #888;">
        </div>

        <!-- ============================
             TELÉFONO
             ============================ -->
        <div class="mb-3">
            <label style="color: #90e0a0; font-weight: 500;">📞 Teléfono del cliente</label>
            <input type="tel" name="telefono" class="form-control" placeholder="Ej: +56912345678">
        </div>

        <!-- ============================
             OBSERVACIONES
             ============================ -->
        <div class="mb-3">
            <label style="color: #90e0a0; font-weight: 500;">📝 Observaciones del ingreso</label>
            <textarea name="observaciones" class="form-control" rows="3" placeholder="Detalles del ingreso, fallas, etc."></textarea>
        </div>

        <!-- ============================
             BOTONES
             ============================ -->
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" id="btnGuardarCliente" class="btn btn-primary" style="flex:1; background: #00ff66 !important; color: #000 !important; font-weight: 700; border-radius: 10px; padding: 14px; font-size: 18px; border: none; cursor: pointer;">
                <i class="fas fa-save"></i> Registrar Cliente
            </button>
            <a href="/estado" class="btn" style="
                background: rgba(255,255,255,0.06);
                color: #888;
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 10px;
                padding: 14px 24px;
                text-decoration: none;
                text-align: center;
            ">
                ← Volver
            </a>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

    // ============================
    // 1. FLOTA: Mostrar input para nueva flota
    // ============================
    const flotaSelect = document.getElementById('flotaSelect');
    const flotaNuevaInput = document.getElementById('flotaNuevaInput');
    const btnNuevaFlota = document.getElementById('btnNuevaFlota');

    flotaSelect.addEventListener('change', function() {
        if (this.value === '__nueva__') {
            flotaNuevaInput.style.display = 'block';
            flotaNuevaInput.focus();
            btnNuevaFlota.textContent = '✅ Guardar';
            btnNuevaFlota.style.background = 'rgba(0,255,102,0.20)';
        } else {
            flotaNuevaInput.style.display = 'none';
            btnNuevaFlota.innerHTML = '<i class="fa-solid fa-plus"></i>';
            btnNuevaFlota.style.background = 'rgba(0,255,102,0.12)';
        }
    });

    btnNuevaFlota.addEventListener('click', function() {
        if (flotaSelect.value === '__nueva__') {
            const nombre = flotaNuevaInput.value.trim();
            if (nombre) {
                const option = document.createElement('option');
                option.value = nombre;
                option.textContent = nombre;
                flotaSelect.insertBefore(option, flotaSelect.querySelector('option[value="__nueva__"]'));
                flotaSelect.value = nombre;
                flotaNuevaInput.style.display = 'none';
                btnNuevaFlota.innerHTML = '<i class="fa-solid fa-plus"></i>';
                btnNuevaFlota.style.background = 'rgba(0,255,102,0.12)';
            } else {
                alert('⚠️ Escribe un nombre para la flota');
            }
        } else {
            flotaSelect.value = '__nueva__';
            flotaNuevaInput.style.display = 'block';
            flotaNuevaInput.focus();
            btnNuevaFlota.textContent = '✅ Guardar';
            btnNuevaFlota.style.background = 'rgba(0,255,102,0.20)';
        }
    });

    // ============================
    // 2. MARCA + MODELO (con "OTRA")
    // ============================
    const marcaSelect = document.getElementById('marca');
    const modeloSelect = document.getElementById('modelo');
    const marcaManual = document.getElementById('marca_manual');
    const modeloManual = document.getElementById('modelo_manual');

    marcaSelect.addEventListener('change', function() {
        const marca = this.value;
        if (marca === '__manual__') {
            marcaManual.style.display = 'block';
            modeloSelect.innerHTML = '<option value="">Seleccione modelo</option>';
            modeloSelect.disabled = true;
            modeloManual.style.display = 'block';
            return;
        }
        marcaManual.style.display = 'none';
        modeloSelect.disabled = false;
        modeloManual.style.display = 'none';

        fetch('/modelos/' + encodeURIComponent(marca))
            .then(r => r.json())
            .then(data => {
                modeloSelect.innerHTML = '<option value="">Seleccione modelo</option>';
                data.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    modeloSelect.appendChild(opt);
                });
                const optManual = document.createElement('option');
                optManual.value = '__manual__';
                optManual.textContent = 'OTRO';
                modeloSelect.appendChild(optManual);
            })
            .catch(() => {});
    });

    modeloSelect.addEventListener('change', function() {
        if (this.value === '__manual__') {
            modeloManual.style.display = 'block';
        } else {
            modeloManual.style.display = 'none';
        }
    });

    // ============================
    // 3. ENVÍO DEL FORMULARIO (con anti-doble clic)
    // ============================
    const form = document.getElementById('formAgregar');
    const submitBtn = document.getElementById('btnGuardarCliente');

    form.addEventListener('submit', function(e) {
        // Si se seleccionó "OTRA" en marca, usar el valor manual
        if (marcaSelect.value === '__manual__') {
            const manualVal = marcaManual.value.trim();
            if (manualVal) {
                const opt = document.createElement('option');
                opt.value = manualVal;
                opt.textContent = manualVal;
                opt.selected = true;
                marcaSelect.appendChild(opt);
            } else {
                e.preventDefault();
                alert('⚠️ Escribe el nombre de la marca');
                return;
            }
        }

        // Si se seleccionó "OTRO" en modelo, usar el valor manual
        if (modeloSelect.value === '__manual__') {
            const manualVal = modeloManual.value.trim();
            if (manualVal) {
                const opt = document.createElement('option');
                opt.value = manualVal;
                opt.textContent = manualVal;
                opt.selected = true;
                modeloSelect.appendChild(opt);
            } else {
                e.preventDefault();
                alert('⚠️ Escribe el nombre del modelo');
                return;
            }
        }

        // Si flota es "__nueva__", usar el valor del input
        if (flotaSelect.value === '__nueva__') {
            const flotaVal = flotaNuevaInput.value.trim();
            if (flotaVal) {
                const opt = document.createElement('option');
                opt.value = flotaVal;
                opt.textContent = flotaVal;
                opt.selected = true;
                flotaSelect.appendChild(opt);
            } else {
                e.preventDefault();
                alert('⚠️ Escribe el nombre de la flota');
                return;
            }
        }

        // ✅ ANTI-DOBLE CLIC: Deshabilitar botón
        submitBtn.disabled = true;
        submitBtn.innerHTML = '⏳ Guardando...';
        submitBtn.style.opacity = '0.7';
    });

    // ✅ Si el formulario falla, habilitar botón después de 10 segundos
    // (por si la página no se recarga por error de red)
    setTimeout(function() {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '💾 Guardar Cliente';
        submitBtn.style.opacity = '1';
    }, 10000);
});
// ============================================
// BUSCAR ESTADO DEL CLIENTE AL ESCRIBIR NOMBRE
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    const inputNombre = document.querySelector('input[name="nombre"]');
    if (!inputNombre) return;
    
    let timeoutBusqueda = null;
    
    inputNombre.addEventListener('input', function() {
        clearTimeout(timeoutBusqueda);
        const nombre = this.value.trim();
        
        if (nombre.length < 3) {
            document.getElementById('estadoClienteContainer').style.display = 'none';
            return;
        }
        
        timeoutBusqueda = setTimeout(function() {
            buscarEstadoCliente(nombre);
        }, 500);
    });
});

function buscarEstadoCliente(nombre) {
    fetch(`${API_URL}/api/deudores/${encodeURIComponent(nombre)}`)
        .then(r => {
            if (r.status === 404) {
                document.getElementById('estadoClienteContainer').style.display = 'none';
                return null;
            }
            return r.json();
        })
        .then(data => {
            if (data && data.monto_deuda > 0) {
                mostrarEstadoCliente(data);
            } else {
                document.getElementById('estadoClienteContainer').style.display = 'none';
            }
        })
        .catch(() => {
            document.getElementById('estadoClienteContainer').style.display = 'none';
        });
}

function mostrarEstadoCliente(data) {
    const container = document.getElementById('estadoClienteContainer');
    container.style.display = 'block';
    
    const estado = data.estado || 'verde';
    const monto = data.monto_deuda || 0;
    
    const colores = {
        'verde': { bg: 'rgba(0,255,102,0.08)', border: '#00ff66', color: '#00ff66', text: '✅ Cliente sin deuda' },
        'amarillo': { bg: 'rgba(241,196,15,0.08)', border: '#f1c40f', color: '#f1c40f', text: '🟡 Cliente con deuda (baja)' },
        'rojo': { bg: 'rgba(255,107,107,0.08)', border: '#ff6b6b', color: '#ff6b6b', text: '🔴 Cliente con deuda crítica' },
        'negro': { bg: 'rgba(0,0,0,0.20)', border: '#888', color: '#888', text: '⚫ Cliente en lista negra' }
    };
    
    const config = colores[estado] || colores['verde'];
    
    container.style.background = config.bg;
    container.style.borderColor = config.border;
    
    document.getElementById('circuloClienteEstado').style.background = config.border;
    document.getElementById('textoClienteEstado').textContent = config.text;
    document.getElementById('textoClienteEstado').style.color = config.color;
    document.getElementById('montoClienteDeuda').textContent = '$' + monto.toLocaleString('es-CL');
    
    const fecha = data.fecha_deuda ? new Date(data.fecha_deuda) : null;
    document.getElementById('fechaClienteDeuda').textContent = fecha ? `📅 Desde: ${fecha.toLocaleDateString('es-CL')}` : '';
    container.dataset.cliente = data.cliente_nombre;
}

function verHistorialCliente() {
    const container = document.getElementById('estadoClienteContainer');
    const cliente = container.dataset.cliente;
    if (!cliente) return;
    
    // Crear modal temporal
    const modal = document.createElement('div');
    modal.className = 'modal-dixon active';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 style="color: #4fc3f7;">📜 Historial de Deudas - ${cliente}</h3>
                <button class="close-btn" onclick="this.closest('.modal-dixon').remove()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="contenidoHistorialCliente" style="max-height: 400px; overflow-y: auto;">
                <div style="text-align:center;padding:20px;color:#888;">Cargando...</div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    fetch(`${API_URL}/api/deudores/historial/${encodeURIComponent(cliente)}`)
        .then(r => r.json())
        .then(data => {
            const contenido = document.getElementById('contenidoHistorialCliente');
            if (data.length === 0) {
                contenido.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">No hay historial de deudas</div>';
                return;
            }
            
            let html = `<div style="font-size:13px;">`;
            data.forEach(item => {
                const fecha = new Date(item.fecha);
                const fechaStr = fecha.toLocaleDateString('es-CL') + ' ' + fecha.toLocaleTimeString('es-CL', {hour:'2-digit',minute:'2-digit'});
                const tipoEmoji = item.tipo === 'deuda' ? '⚠️' : '💰';
                const tipoColor = item.tipo === 'deuda' ? '#ff6b6b' : '#00ff66';
                html += `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
                        <div>
                            <span style="color:${tipoColor};">${tipoEmoji}</span>
                            <span style="color:#fff;">${item.tipo === 'deuda' ? 'Deuda' : 'Abono'}</span>
                            ${item.tipo === 'deuda' ? 
                                `<span style="color:#ff6b6b;font-weight:600;">+$${item.monto_deuda.toLocaleString()}</span>` :
                                `<span style="color:#00ff66;font-weight:600;">-$${item.monto_abonado.toLocaleString()}</span>`
                            }
                        </div>
                        <div style="color:#888;font-size:12px;">
                            ${item.saldo_restante > 0 ? `Saldo: $${item.saldo_restante.toLocaleString()}` : '✅ Liquidado'}
                        </div>
                        <div style="color:#666;font-size:11px;">${fechaStr}</div>
                    </div>
                `;
            });
            html += `</div>`;
            contenido.innerHTML = html;
        })
        .catch(() => {
            document.getElementById('contenidoHistorialCliente').innerHTML = 
                '<div style="color:#ff6b6b;text-align:center;padding:20px;">❌ Error al cargar historial</div>';
        });
}
</script>

{% endblock %}
