{% extends "base.html" %}

{% block content %}

<div class="base-container" style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #00ff66; font-weight: 700; text-align: center; margin-bottom: 20px;">
        💰 Registrar Pago
    </h2>

    <form method="POST" action="https://ea-dixon-production.up.railway.app/api/pagar/{{ id }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="mb-3">
            <label style="color: #90e0a0;">💰 Monto pagado</label>
            <input type="number" name="monto" id="montoInput" class="form-control" required step="0.01" value="0">
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">💳 Forma de Pago</label>
            <select name="forma_pago" id="formaPago" class="form-control" style="
                background: rgba(0,0,0,0.40);
                color: #fff;
                border: 1px solid rgba(0,255,102,0.20);
                border-radius: 8px;
                padding: 8px 12px;
                font-size: 14px;
                width: 100%;
            ">
                <option value="efectivo">💵 Efectivo</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="transferencia">🏦 Transferencia</option>
                <option value="debito">💳 Débito</option>
            </select>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">🩺 Diagnóstico</label>
            <textarea name="diagnostico" id="diagnosticoInput" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">🔧 Reparación realizada</label>
            <textarea name="reparacion" id="reparacionInput" class="form-control" rows="2">Reparación realizada</textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">📝 Observaciones</label>
            <textarea name="observaciones_pago" id="observacionesInput" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">✅ Resultado</label>
            <div style="display:flex; gap:15px; margin-top:6px;">
                <label><input type="radio" name="resultado" value="reparado" checked> Reparado</label>
                <label><input type="radio" name="resultado" value="pendiente"> Pendiente</label>
                <label><input type="radio" name="resultado" value="derivado"> Derivado</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" style="
            background: #00ff66 !important;
            color: #000 !important;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        ">Confirmar Pago</button>
    </form>
</div>

<script>
// ✅ UN SOLO SCRIPT
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // ✅ OBTENER VALORES
    const monto = document.getElementById('montoInput').value;
    const formaPago = document.getElementById('formaPago').value;  // 👈 ESTO DEBE FUNCIONAR
    const diagnostico = document.getElementById('diagnosticoInput').value;
    const reparacion = document.getElementById('reparacionInput').value;
    const observaciones_pago = document.getElementById('observacionesInput').value;
    const resultado = document.querySelector('input[name="resultado"]:checked').value;
    
    // ✅ LOG PARA VERIFICAR (MUY IMPORTANTE)
    console.log('📤 forma_pago SELECCIONADO:', formaPago);
    console.log('📤 monto:', monto);
    
    // ✅ SI EL LOG MUESTRA "efectivo" SIEMPRE, EL PROBLEMA ES EL SELECT
    // SI EL LOG MUESTRA "transferencia" O "tarjeta", EL PROBLEMA ES EL BACKEND
    
    const data = {
        monto: monto || 0,
        forma_pago: formaPago,  // 👈 ENVIAR EL VALOR CAPTURADO
        diagnostico: diagnostico,
        reparacion: reparacion,
        observaciones_pago: observaciones_pago,
        resultado: resultado,
        atendido_por: '{{ session.get("nombre_completo", "Técnico") }}'
    };
    
    console.log('📦 Data enviada:', data);  // 👈 VERIFICAR AQUÍ
    
    const url = 'https://ea-dixon-production.up.railway.app/api/pagar/{{ id }}';
    
    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            window.location.href = `/pago_exitoso/{{ id }}`;
        } else {
            alert('❌ Error: ' + (data.error || 'Error desconocido'));
        }
    })
    .catch(error => {
        console.error('❌ Error:', error);
        alert('❌ Error de conexión: ' + error.message);
    });
});
</script>

{% endblock %}
