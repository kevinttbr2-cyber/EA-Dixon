{% extends "base.html" %}

{% block content %}

<div class="base-container" style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #00ff66; font-weight: 700; text-align: center; margin-bottom: 20px;">
        💰 Registrar Pago
    </h2>

    <!-- ✅ URL COMPLETA DE RAILWAY -->
    <form method="POST" action="https://ea-dixon-production.up.railway.app/api/pagar/{{ id }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="mb-3">
            <label style="color: #90e0a0;">💰 Monto pagado</label>
            <input type="number" name="monto" class="form-control" required step="0.01" value="0">
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">💳 Forma de Pago</label>
            <select name="forma_pago" id="formaPago" class="form-control" style="
                background: rgba(0,0,0,0.40);
                color: #fff;
                border: 1px solid rgba(0,255,102,0.20);
                border-radius: 8px;
                padding: 8px 12px;
                font-size: 14px;
                width: 100%;
            ">
                <option value="efectivo">💵 Efectivo</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="transferencia">🏦 Transferencia</option>
            </select>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">🩺 Diagnóstico</label>
            <textarea name="diagnostico" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">🔧 Reparación realizada</label>
            <textarea name="reparacion" class="form-control" rows="2">Reparación realizada</textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">📝 Observaciones</label>
            <textarea name="observaciones_pago" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">✅ Resultado</label>
            <div style="display:flex; gap:15px; margin-top:6px;">
                <label><input type="radio" name="resultado" value="reparado" checked> Reparado</label>
                <label><input type="radio" name="resultado" value="pendiente"> Pendiente</label>
                <label><input type="radio" name="resultado" value="derivado"> Derivado</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" style="
            background: #00ff66 !important;
            color: #000 !important;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        ">Confirmar Pago</button>
    </form>
</div>

<script>
// ✅ UN SOLO SCRIPT - CON URL COMPLETA
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();  // Evita el envío normal del formulario
    
    // ✅ Obtener valores del formulario
    const monto = document.querySelector('input[name="monto"]').value;
    const formaPago = document.getElementById('formaPago').value;
    const diagnostico = document.querySelector('textarea[name="diagnostico"]').value;
    const reparacion = document.querySelector('textarea[name="reparacion"]').value;
    const observaciones_pago = document.querySelector('textarea[name="observaciones_pago"]').value;
    const resultado = document.querySelector('input[name="resultado"]:checked').value;
    
    console.log('📤 Enviando pago:');
    console.log('  - monto:', monto);
    console.log('  - forma_pago:', formaPago);
    
    const data = {
        monto: monto,
        forma_pago: formaPago,
        diagnostico: diagnostico,
        reparacion: reparacion,
        observaciones_pago: observaciones_pago,
        resultado: resultado,
        atendido_por: '{{ session.get("nombre_completo", "Técnico") }}'
    };
    
    // ✅ URL COMPLETA DE RAILWAY
    const url = 'https://ea-dixon-production.up.railway.app/api/pagar/{{ id }}';
    console.log('📡 Enviando a:', url);
    
    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => {
        console.log('📥 Respuesta status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('📥 Respuesta data:', data);
        if (data.success) {
            // ✅ REDIRIGIR AL PDF
            const id = {{ id }};
            const firma = '{{ firma }}';
            window.location.href = `/pago_exitoso/${id}`;
        } else {
            alert('❌ Error: ' + (data.error || 'Error desconocido'));
        }
    })
    .catch(error => {
        console.error('❌ Error de conexión:', error);
        alert('❌ Error de conexión: ' + error.message);
    });
});
</script>

{% endblock %}
