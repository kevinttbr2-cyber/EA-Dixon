{% extends "base.html" %}

{% block content %}

<style>
/* ============================================
   ESTILOS PAGAR
   ============================================ */
.pagar-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 10px 15px;
}

.pagar-container .cliente-info {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
}

.pagar-container .cliente-info .info-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.pagar-container .cliente-info .circulo-estado {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
}

.pagar-container .cliente-info .nombre {
    font-weight: 600;
    color: var(--text-primary);
    font-size: 16px;
}

.pagar-container .cliente-info .patente {
    color: var(--text-muted);
    font-size: 14px;
}

.pagar-container .cliente-info .deuda-badge {
    font-size: 12px;
    padding: 2px 12px;
    border-radius: 20px;
    font-weight: 600;
}

.pagar-container .cliente-info .deuda-badge.verde {
    background: rgba(0, 255, 102, 0.10);
    color: #00ff66;
    border: 1px solid rgba(0, 255, 102, 0.20);
}

.pagar-container .cliente-info .deuda-badge.amarillo {
    background: rgba(241, 196, 15, 0.10);
    color: #f1c40f;
    border: 1px solid rgba(241, 196, 15, 0.20);
}

.pagar-container .cliente-info .deuda-badge.rojo {
    background: rgba(255, 107, 107, 0.10);
    color: #ff6b6b;
    border: 1px solid rgba(255, 107, 107, 0.20);
}

.pagar-container .cliente-info .deuda-badge.negro {
    background: rgba(0, 0, 0, 0.30);
    color: #888;
    border: 1px solid rgba(255, 255, 255, 0.10);
}

/* ============================================
   MONTO TOTAL (EDITABLE - SIEMPRE VISIBLE)
   ============================================ */
.pagar-container .monto-total {
    background: rgba(46, 204, 113, 0.04);
    border: 1px solid rgba(46, 204, 113, 0.15);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-bottom: 16px;
}

.pagar-container .monto-total .label {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    display: block;
    margin-bottom: 6px;
}

.pagar-container .monto-total input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-input);
    border: 2px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 22px;
    font-weight: 700;
    transition: var(--transition);
}

.pagar-container .monto-total input:focus {
    outline: none;
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.08);
}

/* ============================================
   BOTÓN PAGO PARCIAL (EXPANDIBLE)
   ============================================ */
.btn-parcial-toggle {
    background: rgba(79, 195, 247, 0.12);
    color: #4fc3f7;
    border: 1px solid rgba(79, 195, 247, 0.20);
    border-radius: var(--radius-md);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
    margin-bottom: 12px;
}

.btn-parcial-toggle:hover {
    background: rgba(79, 195, 247, 0.20);
    transform: scale(1.01);
}

.btn-parcial-toggle .icon {
    transition: var(--transition);
}

.btn-parcial-toggle .icon.open {
    transform: rotate(45deg);
}

/* ============================================
   SECCIÓN PAGO PARCIAL (expandible)
   ============================================ */
.parcial-section {
    display: none;
    margin-bottom: 16px;
    padding: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    border-left: 3px solid #4fc3f7;
}

.parcial-section.open {
    display: block;
}

.parcial-section .form-group {
    margin-bottom: 10px;
}

.parcial-section .form-group label {
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
}

.parcial-section .form-group input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 14px;
    transition: var(--transition);
}

.parcial-section .form-group input:focus {
    outline: none;
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.08);
}

/* ============================================
   DEUDA GENERADA (se muestra automáticamente)
   ============================================ */
.deuda-generada {
    display: none;
    margin-top: 12px;
    padding: 12px 16px;
    background: rgba(255, 107, 107, 0.06);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255, 107, 107, 0.15);
    border-left: 3px solid #ff6b6b;
}

.deuda-generada.show {
    display: block;
}

.deuda-generada .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.deuda-generada .row .label {
    color: var(--text-muted);
    font-size: 14px;
}

.deuda-generada .row .valor {
    color: #ff6b6b;
    font-weight: 700;
    font-size: 20px;
}

/* ============================================
   FORMULARIO COMPLETO (siempre visible)
   ============================================ */
.pagar-container .form-control {
    background: var(--bg-input) !important;
    color: var(--text-primary) !important;
    border: 1px solid var(--border-subtle) !important;
    border-radius: var(--radius-sm) !important;
    padding: 8px 12px !important;
    font-size: 14px !important;
    width: 100% !important;
}

.pagar-container textarea.form-control {
    min-height: 50px;
}

.pagar-container .btn-primary {
    background: var(--accent-green) !important;
    color: var(--bg-primary) !important;
    font-weight: 700 !important;
    border: none !important;
    border-radius: var(--radius-md) !important;
    padding: 12px !important;
    font-size: 16px !important;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: var(--transition);
}

.pagar-container .btn-primary:hover {
    transform: scale(1.01);
    box-shadow: 0 0 30px rgba(0, 255, 102, 0.15);
}

.pagar-container .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.pagar-container .radio-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 6px;
}

.pagar-container .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
}

.pagar-container .radio-group input[type="radio"] {
    accent-color: var(--accent-green);
    width: 16px;
    height: 16px;
    cursor: pointer;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 600px) {
    .pagar-container .monto-total input {
        font-size: 18px;
    }
    .pagar-container .cliente-info {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>

<div class="base-container pagar-container">

    <!-- ============================================
    CLIENTE INFO (CON CÍRCULO DE ESTADO)
    ============================================ -->
    <div class="cliente-info" id="clienteInfo">
        <div class="info-left">
            <!-- Círculo de estado (se carga con JS) -->
            <span class="circulo-estado" id="circuloEstado" 
                  style="display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: #888; box-shadow: none;">
            </span>
            <span class="nombre">👤 {{ registro.nombre }}</span>
            {% if registro.patente %}
            <span class="patente">🚗 {{ registro.patente }}</span>
            {% endif %}
        </div>
        <div>
            <span class="deuda-badge" id="deudaBadge" style="display: none;">Cargando...</span>
        </div>
    </div>

    <!-- ============================================
    MONTO TOTAL (EDITABLE - SIEMPRE VISIBLE)
    ============================================ -->
    <div class="monto-total">
        <label class="label">💰 Monto total a pagar</label>
        <input type="number" id="montoTotal" class="form-control" step="0.01" min="0" 
               placeholder="Ingresa el monto total del servicio..." 
               value="{{ registro.monto }}">
    </div>

    <!-- ============================================
    BOTÓN PAGO PARCIAL (expande la sección)
    ============================================ -->
    <button class="btn-parcial-toggle" onclick="toggleParcial()">
        <span class="material-symbols-rounded icon">add</span>
        📝 Pago Parcial
    </button>

    <!-- ============================================
    SECCIÓN PAGO PARCIAL (expandible)
    ============================================ -->
    <div class="parcial-section" id="parcialSection">
        <div class="form-group">
            <label>💵 ¿Cuánto va a pagar hoy?</label>
            <input type="number" id="montoPagar" class="form-control" step="0.01" min="0" 
                   placeholder="Ingresa el monto que pagará hoy...">
        </div>

        <!-- DEUDA GENERADA (se calcula automáticamente) -->
        <div class="deuda-generada" id="deudaGenerada">
            <div class="row">
                <span class="label">⚠️ Diferencia (deuda generada):</span>
                <span class="valor" id="diferenciaDeuda">$0</span>
            </div>
        </div>
    </div>

    <!-- ============================================
    FORMULARIO COMPLETO (siempre visible - FUERA del pago parcial)
    ============================================ -->
    <div>

        <div class="form-group">
            <label style="color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px;">💳 Forma de Pago</label>
            <select id="formaPago" class="form-control">
                <option value="efectivo">💵 Efectivo</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="transferencia">🏦 Transferencia</option>
            </select>
        </div>

        <div class="form-group">
            <label style="color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px;">📝 Observaciones del pago</label>
            <textarea id="observacionesPago" class="form-control" rows="2" placeholder="Detalles del pago..."></textarea>
        </div>

        <div class="form-group">
            <label style="color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px;">🩺 Diagnóstico</label>
            <textarea id="diagnosticoInput" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
            <label style="color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px;">🔧 Reparación realizada</label>
            <textarea id="reparacionInput" class="form-control" rows="2">Reparación realizada</textarea>
        </div>

        <div class="form-group">
            <label style="color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px;">✅ Resultado</label>
            <div class="radio-group">
                <label><input type="radio" name="resultado" value="reparado" checked> Reparado</label>
                <label><input type="radio" name="resultado" value="pendiente"> Pendiente</label>
                <label><input type="radio" name="resultado" value="derivado"> Derivado</label>
            </div>
        </div>

        <button class="btn-primary" onclick="confirmarPago()">
            💾 Confirmar Pago
        </button>
    </div>

</div>

<script>
const API_URL = 'https://ea-dixon-production.up.railway.app';
const idRegistro = '{{ id }}';
const nombreCliente = '{{ registro.nombre }}';
const patenteCliente = '{{ registro.patente }}';

// ============================================
// CARGAR ESTADO DEL DEUDOR
// ============================================
function cargarEstadoDeudor() {
    if (!nombreCliente) return;
    
    const circulo = document.getElementById('circuloEstado');
    const badge = document.getElementById('deudaBadge');
    
    fetch(`${API_URL}/api/deudores/${encodeURIComponent(nombreCliente)}`)
        .then(r => {
            if (r.status === 404) {
                // Cliente sin deuda
                circulo.style.background = '#00ff66';
                circulo.style.boxShadow = '0 0 8px rgba(0,255,102,0.3)';
                badge.style.display = 'inline-block';
                badge.className = 'deuda-badge verde';
                badge.textContent = '✅ Sin deuda';
                return null;
            }
            return r.json();
        })
        .then(data => {
            if (data && data.monto_deuda > 0) {
                const estado = data.estado || 'verde';
                const colores = {
                    'verde': { bg: '#00ff66', shadow: 'rgba(0,255,102,0.3)', clase: 'verde', texto: '✅ Sin deuda' },
                    'amarillo': { bg: '#f1c40f', shadow: 'rgba(241,196,15,0.3)', clase: 'amarillo', texto: '🟡 Deudor' },
                    'rojo': { bg: '#ff6b6b', shadow: 'rgba(255,107,107,0.3)', clase: 'rojo', texto: '🔴 Deudor crítico' },
                    'negro': { bg: '#333333', shadow: 'rgba(0,0,0,0.3)', clase: 'negro', texto: '⚫ Lista negra' }
                };
                const config = colores[estado] || colores['verde'];
                circulo.style.background = config.bg;
                circulo.style.boxShadow = `0 0 8px ${config.shadow}`;
                badge.style.display = 'inline-block';
                badge.className = `deuda-badge ${config.clase}`;
                badge.textContent = `${config.texto} - $${data.monto_deuda.toLocaleString()}`;
            }
        })
        .catch(() => {
            circulo.style.background = '#888';
            circulo.style.boxShadow = 'none';
            badge.style.display = 'inline-block';
            badge.className = 'deuda-badge';
            badge.textContent = '❌ Error';
        });
}

// ============================================
// TOGGLE PAGO PARCIAL
// ============================================
function toggleParcial() {
    const section = document.getElementById('parcialSection');
    const icon = document.querySelector('.btn-parcial-toggle .icon');
    
    section.classList.toggle('open');
    icon.classList.toggle('open');
    
    if (section.classList.contains('open')) {
        const montoTotal = parseFloat(document.getElementById('montoTotal').value) || 0;
        document.getElementById('montoPagar').value = montoTotal;
        calcularDiferencia();
    }
}

// ============================================
// CALCULAR DIFERENCIA (DEUDA)
// ============================================
function calcularDiferencia() {
    const montoTotal = parseFloat(document.getElementById('montoTotal').value) || 0;
    const montoPagar = parseFloat(document.getElementById('montoPagar').value) || 0;
    const diferencia = Math.max(0, montoTotal - montoPagar);
    
    const deudaDiv = document.getElementById('deudaGenerada');
    const diferenciaSpan = document.getElementById('diferenciaDeuda');
    
    diferenciaSpan.textContent = '$' + diferencia.toLocaleString('es-CL');
    
    if (diferencia > 0) {
        deudaDiv.classList.add('show');
    } else {
        deudaDiv.classList.remove('show');
    }
}

document.getElementById('montoTotal').addEventListener('input', function() {
    // Si la sección parcial está abierta, recalcular
    if (document.getElementById('parcialSection').classList.contains('open')) {
        calcularDiferencia();
    }
});

document.getElementById('montoPagar').addEventListener('input', calcularDiferencia);

// ============================================
// CONFIRMAR PAGO
// ============================================
function confirmarPago() {
    const montoTotal = parseFloat(document.getElementById('montoTotal').value) || 0;
    const parcialSection = document.getElementById('parcialSection');
    const montoPagar = parseFloat(document.getElementById('montoPagar').value) || 0;
    const formaPago = document.getElementById('formaPago').value;
    const observaciones = document.getElementById('observacionesPago').value;
    const diagnostico = document.getElementById('diagnosticoInput').value;
    const reparacion = document.getElementById('reparacionInput').value;
    const resultado = document.querySelector('input[name="resultado"]:checked')?.value || 'reparado';
    const esPagoParcial = parcialSection.classList.contains('open') && montoPagar < montoTotal;
    const diferencia = Math.max(0, montoTotal - montoPagar);
    
    if (montoTotal <= 0) {
        alert('⚠️ Ingresa el monto total del servicio');
        document.getElementById('montoTotal').focus();
        return;
    }
    
    if (esPagoParcial && montoPagar <= 0) {
        alert('⚠️ Ingresa el monto que va a pagar hoy');
        document.getElementById('montoPagar').focus();
        return;
    }
    
    if (esPagoParcial && montoPagar > montoTotal) {
        alert('⚠️ El monto a pagar no puede ser mayor al total');
        return;
    }
    
    // Confirmar si hay deuda
    if (esPagoParcial && diferencia > 0) {
        if (!confirm(`📊 Confirmar pago parcial\n\n` +
            `💰 Monto total del servicio: $${montoTotal.toLocaleString()}\n` +
            `💵 Monto a pagar hoy: $${montoPagar.toLocaleString()}\n` +
            `⚠️ Deuda generada: $${diferencia.toLocaleString()}\n\n` +
            `¿Confirmar?`)) {
            return;
        }
    } else {
        if (!confirm(`✅ ¿Confirmar pago de $${montoTotal.toLocaleString()}?`)) {
            return;
        }
    }
    
    const btn = document.querySelector('.btn-primary');
    btn.disabled = true;
    btn.textContent = '⏳ Procesando...';
    
    // 1. Registrar el pago
    const dataPago = {
        monto: esPagoParcial ? montoPagar : montoTotal,
        forma_pago: formaPago,
        diagnostico: diagnostico,
        reparacion: reparacion,
        observaciones_pago: observaciones || '',
        resultado: resultado,
        atendido_por: '{{ session.get("nombre_completo", session.get("usuario")) }}'
    };
    
    fetch(`${API_URL}/api/pagar/${idRegistro}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dataPago)
    })
    .then(r => r.json())
    .then(result => {
        if (!result.success) {
            throw new Error(result.error || 'Error al procesar pago');
        }
        
        // 2. Si hay deuda, registrarla
        if (esPagoParcial && diferencia > 0) {
            return fetch(`${API_URL}/api/deudores`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cliente_nombre: nombreCliente,
                    patente: patenteCliente,
                    telefono: '{{ registro.telefono }}',
                    monto_deuda: diferencia,
                    monto_original: diferencia,
                    id_registro: idRegistro,
                    descripcion: `Deuda generada por pago parcial del servicio #${idRegistro}. Total: $${montoTotal.toLocaleString()}, Abonado: $${(esPagoParcial ? montoPagar : montoTotal).toLocaleString()}`
                })
            });
        }
        return Promise.resolve({ success: true });
    })
    .then(resultDeuda => {
        if (resultDeuda && resultDeuda.success === false) {
            console.warn('⚠️ La deuda no se pudo registrar:', resultDeuda.error);
        }
        
        let mensaje = '✅ Pago registrado correctamente';
        if (esPagoParcial && diferencia > 0) {
            mensaje += `\n\n💰 Deuda generada: $${diferencia.toLocaleString()}`;
            mensaje += `\n📌 El cliente debe $${diferencia.toLocaleString()}`;
        }
        alert(mensaje);
        window.location.href = `/pago_exitoso/${idRegistro}`;
    })
    .catch(error => {
        alert('❌ Error: ' + error.message);
        btn.disabled = false;
        btn.textContent = '💾 Confirmar Pago';
    });
}

// ============================================
// DESHABILITAR SCROLL EN INPUTS NUMÉRICOS
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('wheel', function(e) {
            e.preventDefault();
            this.blur();
        }, { passive: false });
    });
    
    // Cargar estado del deudor
    cargarEstadoDeudor();
});
</script>

{% endblock %}
