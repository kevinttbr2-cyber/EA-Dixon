{% extends "base.html" %}

{% block content %}

<div class="base-container" style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #00ff66; font-weight: 700; text-align: center; margin-bottom: 20px;">
        💰 Registrar Pago
    </h2>

    <!-- ✅ URL COMPLETA DE RAILWAY -->
    <form method="POST" action="https://ea-dixon-production.up.railway.app/api/pagar/{{ id }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="mb-3">
            <label style="color: #90e0a0;">💰 Monto pagado</label>
            <input type="number" name="monto" class="form-control" required step="0.01" value="0">
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">💳 Forma de Pago</label>
            <select name="forma_pago" id="formaPago" class="form-control" style="
                background: rgba(0,0,0,0.40);
                color: #fff;
                border: 1px solid rgba(0,255,102,0.20);
                border-radius: 8px;
                padding: 8px 12px;
                font-size: 14px;
                width: 100%;
            ">
                <option value="efectivo">💵 Efectivo</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="transferencia">🏦 Transferencia</option>
            </select>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">🩺 Diagnóstico</label>
            <textarea name="diagnostico" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">🔧 Reparación realizada</label>
            <textarea name="reparacion" class="form-control" rows="2">Reparación realizada</textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">📝 Observaciones</label>
            <textarea name="observaciones_pago" class="form-control" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0;">✅ Resultado</label>
            <div style="display:flex; gap:15px; margin-top:6px;">
                <label><input type="radio" name="resultado" value="reparado" checked> Reparado</label>
                <label><input type="radio" name="resultado" value="pendiente"> Pendiente</label>
                <label><input type="radio" name="resultado" value="derivado"> Derivado</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" style="
            background: #00ff66 !important;
            color: #000 !important;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        ">Confirmar Pago</button>
    </form>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const formaPago = document.getElementById('formaPago').value;
    console.log('📤 forma_pago seleccionado:', formaPago);
});
</script>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();  // ❌ Esto evita el envío normal del formulario
    
    const data = {
        monto: document.querySelector('input[name="monto"]').value,
        forma_pago: document.getElementById('formaPago').value,
        diagnostico: document.querySelector('textarea[name="diagnostico"]').value,
        reparacion: document.querySelector('textarea[name="reparacion"]').value,
        observaciones_pago: document.querySelector('textarea[name="observaciones_pago"]').value,
        resultado: document.querySelector('input[name="resultado"]:checked').value,
        atendido_por: '{{ session.get("nombre_completo", "Técnico") }}'
    };
    
    fetch('/api/pagar/{{ id }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // ✅ REDIRIGIR AL PDF
            window.location.href = `/api/pdf/{{ id }}/{{ firma }}`;
        } else {
            alert('❌ Error: ' + data.error);
        }
    })
    .catch(error => {
        alert('❌ Error de conexión');
    });
});
</script>

{% endblock %}
