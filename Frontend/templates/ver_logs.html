{% extends "base.html" %}

{% block content %}

<div class="base-container">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
        <h2 style="color: #4fc3f7; font-weight: 700; margin: 0; font-size: 22px;">
            📋 Logs del Sistema
        </h2>
        <div style="display: flex; gap: 8px;">
            <a href="/dashboard" class="btn btn-sm" style="
                background: rgba(255,255,255,0.06);
                color: #888;
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 20px;
                padding: 6px 16px;
                text-decoration: none;
                font-size: 13px;
            ">
                ← Volver
            </a>
        </div>
    </div>

    <!-- Botones de control -->
    <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
        <a href="/ver_logs?limpiar=si" class="btn btn-sm" style="
            background: rgba(255,107,107,0.12);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.20);
            border-radius: 8px;
            padding: 6px 16px;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        " onclick="return confirm('⚠️ ¿Estás seguro de limpiar todos los logs?')">
            🗑️ Limpiar logs
        </a>
        <a href="/ver_logs" class="btn btn-sm" style="
            background: rgba(0,255,102,0.06);
            color: #00ff66;
            border: 1px solid rgba(0,255,102,0.12);
            border-radius: 8px;
            padding: 6px 16px;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        ">
            🔄 Recargar
        </a>
    </div>

    <!-- Visualización de logs -->
    <div style="
        background: #0a0a0a; 
        border-radius: 10px; 
        padding: 15px; 
        border: 1px solid rgba(79,195,247,0.15);
        max-height: 600px;
        overflow-y: auto;
    ">
        {% if logs %}
        <pre style="
            color: #00ff66; 
            font-family: 'Courier New', monospace; 
            font-size: 12px; 
            margin: 0;
            padding: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        ">{{ logs }}</pre>
        {% else %}
        <div style="text-align: center; color: #666; padding: 40px 0;">
            <p>No hay logs disponibles</p>
        </div>
        {% endif %}
    </div>

    <div style="margin-top: 10px; color: #666; font-size: 12px; text-align: center;">
        <i class="fa-regular fa-circle-info"></i> Se muestran las últimas 200 líneas
    </div>
</div>

{% endblock %}
