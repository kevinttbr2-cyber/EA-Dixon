{% extends "base.html" %}

{% block content %}

<style>
/* ... estilos (igual que antes) ... */
</style>

<div class="base-container gastos-container">

    <!-- HEADER -->
    <div class="header">
        <h2>
            <span class="material-symbols-rounded" style="color: #ff6b6b;">payments</span>
            Gastos del Día
        </h2>
        <div class="total-gastos">
            <span class="label">💰 Total Gastos</span>
            <span class="monto" id="totalGastosDisplay">$0</span>
        </div>
    </div>

    <!-- RESUMEN RÁPIDO (actualizado por JS) -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px;">
        <div style="background:rgba(0,255,102,0.06);border-radius:10px;padding:10px 14px;border:1px solid rgba(0,255,102,0.12);text-align:center;">
            <div style="color:#888;font-size:11px;">💵 Efectivo</div>
            <div style="color:#00ff66;font-size:18px;font-weight:700;" id="gastosEfectivoDisplay">$0</div>
            <div style="color:#666;font-size:10px;" id="gastosEfectivoCount">0 gastos</div>
        </div>
        <div style="background:rgba(79,195,247,0.06);border-radius:10px;padding:10px 14px;border:1px solid rgba(79,195,247,0.12);text-align:center;">
            <div style="color:#888;font-size:11px;">🏦 Transferencia</div>
            <div style="color:#4fc3f7;font-size:18px;font-weight:700;" id="gastosTransferenciaDisplay">$0</div>
            <div style="color:#666;font-size:10px;" id="gastosTransferenciaCount">0 gastos</div>
        </div>
        <div style="background:rgba(255,200,0,0.06);border-radius:10px;padding:10px 14px;border:1px solid rgba(255,200,0,0.12);text-align:center;">
            <div style="color:#888;font-size:11px;">👨‍🔧 Sueldos</div>
            <div style="color:#ffcc00;font-size:18px;font-weight:700;" id="gastosSueldosDisplay">$0</div>
            <div style="color:#666;font-size:10px;" id="gastosSueldosCount">0 gastos</div>
        </div>
    </div>

    <!-- FORMULARIO PARA REGISTRAR GASTO -->
    <div class="form-gasto">
        <h4 style="color: var(--text-secondary); margin-bottom: 12px; font-size: 16px;">➕ Registrar Gasto</h4>
        <form id="formGasto">
            <!-- ... formulario (igual que antes) ... -->
        </form>
    </div>

    <!-- LISTA DE GASTOS (actualizada por JS) -->
    <div class="gastos-grid" id="listaGastos">
        <div style="text-align: center; color: #888; padding: 40px 0;">
            <span class="material-symbols-rounded" style="font-size: 48px; color: #888; opacity: 0.3; display: block; margin-bottom: 10px;">hourglass_empty</span>
            Cargando gastos...
        </div>
    </div>

    <!-- MES ACTUAL -->
    <div style="margin-top: 16px; text-align: center; color: var(--text-muted); font-size: 13px;">
        📅 {{ mes_actual }}/{{ anio_actual }}
    </div>
</div>

<script>
const API_URL = 'https://ea-dixon-production.up.railway.app';

// ============================================
// CARGAR GASTOS CON JAVASCRIPT
// ============================================
function cargarGastos() {
    const hoy = new Date().toISOString().split('T')[0];
    
    fetch(`${API_URL}/api/gastos?fecha=${hoy}`)
        .then(r => {
            if (!r.ok) {
                throw new Error(`HTTP ${r.status}`);
            }
            return r.json();
        })
        .then(gastos => {
            console.log('📊 Gastos recibidos:', gastos);
            mostrarGastos(gastos);
        })
        .catch(err => {
            console.error('❌ Error al cargar gastos:', err);
            document.getElementById('listaGastos').innerHTML = `
                <div style="text-align: center; color: #ff6b6b; padding: 40px 0;">
                    <span class="material-symbols-rounded" style="font-size: 48px; color: #ff6b6b; opacity: 0.3; display: block; margin-bottom: 10px;">error</span>
                    Error al cargar los gastos
                </div>
            `;
        });
}

function mostrarGastos(gastos) {
    const container = document.getElementById('listaGastos');
    
    if (!gastos || gastos.length === 0) {
        container.innerHTML = `
            <div class="sin-gastos">
                <span class="icono material-symbols-rounded">payments</span>
                <p>💰 No hay gastos registrados hoy</p>
                <span class="sub">Registra tus gastos usando el formulario arriba</span>
            </div>
        `;
        return;
    }
    
    // Calcular totales
    let total = 0;
    let efectivo = 0;
    let transferencia = 0;
    let sueldos = 0;
    let efectivoCount = 0;
    let transferenciaCount = 0;
    let sueldosCount = 0;
    
    gastos.forEach(g => {
        const monto = parseFloat(g.monto) || 0;
        total += monto;
        
        if (g.metodo_pago === 'efectivo') {
            efectivo += monto;
            efectivoCount++;
        } else if (g.metodo_pago === 'transferencia') {
            transferencia += monto;
            transferenciaCount++;
        }
        
        if (g.categoria === 'Sueldos') {
            sueldos += monto;
            sueldosCount++;
        }
    });
    
    // Actualizar resumen
    document.getElementById('totalGastosDisplay').textContent = '$' + total.toLocaleString('es-CL');
    document.getElementById('gastosEfectivoDisplay').textContent = '$' + efectivo.toLocaleString('es-CL');
    document.getElementById('gastosTransferenciaDisplay').textContent = '$' + transferencia.toLocaleString('es-CL');
    document.getElementById('gastosSueldosDisplay').textContent = '$' + sueldos.toLocaleString('es-CL');
    document.getElementById('gastosEfectivoCount').textContent = efectivoCount + ' gastos';
    document.getElementById('gastosTransferenciaCount').textContent = transferenciaCount + ' gastos';
    document.getElementById('gastosSueldosCount').textContent = sueldosCount + ' gastos';
    
    // Mostrar lista
    let html = '';
    gastos.forEach(g => {
        const monto = parseFloat(g.monto) || 0;
        html += `
            <div class="gasto-card" data-id="${g.id}">
                <div class="info">
                    <span class="categoria">${g.categoria}</span>
                    ${g.descripcion ? `<span class="descripcion">📝 ${g.descripcion}</span>` : ''}
                    ${g.proveedor ? `<span class="descripcion" style="color: #4fc3f7;">🏢 ${g.proveedor}</span>` : ''}
                    <span class="metodo">
                        ${g.metodo_pago === 'efectivo' ? '💵 Efectivo' :
                         g.metodo_pago === 'transferencia' ? '🏦 Transferencia' :
                         g.metodo_pago === 'tarjeta' ? '💳 Tarjeta' :
                         '🔄 ' + g.metodo_pago}
                    </span>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span class="monto">-$${monto.toLocaleString('es-CL')}</span>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// ============================================
// FORMULARIO PARA REGISTRAR GASTO
// ============================================
document.getElementById('formGasto').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const data = {
        categoria: document.getElementById('categoria').value,
        monto: parseFloat(document.getElementById('monto').value) || 0,
        metodo_pago: document.getElementById('metodo_pago').value,
        descripcion: document.getElementById('descripcion').value,
        proveedor: document.getElementById('proveedor').value,
        folio: document.getElementById('folio').value,
        fecha: new Date().toISOString().split('T')[0],
        hora: new Date().toTimeString().split(' ')[0],
        registrado_por: '{{ session.get("nombre_completo", session.get("usuario")) }}'
    };
    
    if (!data.categoria || data.monto <= 0) {
        alert('⚠️ Categoría y monto son obligatorios');
        return;
    }
    
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = '⏳ Registrando...';
    
    fetch(`${API_URL}/api/gastos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.success) {
            alert('✅ Gasto registrado correctamente');
            document.getElementById('formGasto').reset();
            cargarGastos(); // Recargar la lista
        } else {
            alert('❌ Error: ' + (result.error || 'Desconocido'));
        }
    })
    .catch(() => {
        alert('❌ Error de conexión');
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-rounded" style="font-size: 18px; vertical-align: middle;">add</span> Registrar Gasto';
    });
});

// ============================================
// INICIALIZAR
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    cargarGastos();
});
</script>

{% endblock %}
