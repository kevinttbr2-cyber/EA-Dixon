{% extends "base.html" %}

{% block content %}

<div class="base-container" style="max-width: 500px; margin: 0 auto;">
    <h2 style="color: #00ff66; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 20px;">
        🔑 Cambiar Contraseña
    </h2>

    {% if error %}
    <div style="
        background: rgba(255, 68, 68, 0.10);
        border: 1px solid rgba(255, 68, 68, 0.20);
        border-radius: 10px;
        padding: 10px 14px;
        color: #ff6b6b;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
    ">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="
        background: rgba(0, 255, 102, 0.10);
        border: 1px solid rgba(0, 255, 102, 0.20);
        border-radius: 10px;
        padding: 10px 14px;
        color: #00ff66;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
    ">
        <i class="fas fa-check-circle"></i> {{ success }}
    </div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="mb-3">
            <label style="color: #90e0a0; font-weight: 500;">🔐 Contraseña actual</label>
            <input type="password" name="password_actual" class="form-control" required>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0; font-weight: 500;">🆕 Nueva contraseña</label>
            <input type="password" name="password_nueva" class="form-control" required minlength="6">
            <small style="color: #666; font-size: 11px;">Mínimo 6 caracteres</small>
        </div>

        <div class="mb-3">
            <label style="color: #90e0a0; font-weight: 500;">✅ Confirmar nueva contraseña</label>
            <input type="password" name="password_confirmar" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100" type="submit" style="
            background: #00ff66;
            color: #000;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            border: none;
            transition: all 0.3s ease;
        ">
            🔄 Cambiar Contraseña
        </button>
    </form>

    <div style="margin-top: 15px; text-align: center;">
        <a href="/estado" class="btn btn-sm" style="
            background: rgba(255,255,255,0.06);
            color: #888;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 8px 24px;
            text-decoration: none;
        ">
            ← Volver al Estado
        </a>
    </div>
</div>

{% endblock %}
