<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dixon Electricidad Automotriz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }
        .login-card {
            background: rgba(15, 15, 15, 0.90);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 50px rgba(0, 255, 102, 0.10);
        }
        .login-logo { text-align: center; margin-bottom: 25px; }
        .login-logo i { font-size: 48px; color: #00ff66; }
        .login-logo h1 { color: #00ff66; font-size: 28px; font-weight: 700; margin-top: 8px; }
        .login-logo p { color: #90e0a0; font-size: 14px; }
        .form-control {
            background: rgba(0,0,0,0.50) !important;
            color: #fff !important;
            border: 1px solid rgba(0,255,102,0.25) !important;
            border-radius: 12px;
            padding: 14px 16px 14px 46px !important;
            height: 54px;
        }
        .form-control:focus {
            border-color: #00ff66 !important;
            box-shadow: 0 0 0 3px rgba(0,255,102,0.12) !important;
        }
        .input-group-custom { position: relative; margin-bottom: 18px; }
        .input-group-custom i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff66;
            font-size: 18px;
            z-index: 10;
        }
        .btn-primary {
            background: #00ff66 !important;
            border: none !important;
            color: #000 !important;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            font-size: 18px;
            width: 100%;
            height: 54px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #00cc52 !important;
            transform: scale(1.02);
        }
        .error-msg {
            background: rgba(255,68,68,0.10);
            border: 1px solid rgba(255,68,68,0.20);
            border-radius: 10px;
            padding: 10px 14px;
            color: #ff6b6b;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }
        .login-footer { text-align: center; margin-top: 20px; color: #555; font-size: 12px; }
        .login-footer i { color: #00ff66; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-car"></i>
            <h1>DIXON</h1>
            <p>Electricidad Automotriz</p>
        </div>

        <h5 style="color:#fff; text-align:center; margin-bottom:20px;">Iniciar sesión</h5>

        {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="input-group-custom">
                <i class="fas fa-user"></i>
                <input type="text" class="form-control" name="username" placeholder="Usuario" required>
            </div>
            <div class="input-group-custom">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
            </div>
            <button class="btn-primary" type="submit"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>

        <div class="login-footer"><i class="fas fa-shield-alt"></i> Conexión segura</div>
    </div>
</body>
</html>
