{% extends "base.html" %}

{% block content %}
<h2 style="color:#00ff66; font-weight:700; text-align:center; margin-bottom:20px;">👥 Usuarios Registrados</h2>

<table class="table table-dark table-hover table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Nombre completo</th>
            <th>Rol</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.nombre_completo or '-' }}</td>
            <td>{{ u.rol }}</td>
            <td>
                <a href="/eliminar_usuario/{{ u.id }}" class="btn btn-danger btn-sm" 
                   onclick="return confirm('¿Eliminar este usuario?')">
                    Eliminar
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
